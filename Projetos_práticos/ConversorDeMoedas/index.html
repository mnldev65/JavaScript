<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>convert-money.com</title>
</head>
<body>
    <main>
        <img class="logo-convert-money" src="./assets/logo.gif" alt="logo-convert-money" class="logo-corvert-money">
        <div class="white-box">
            <label for="">
                Converter <b>de</b>
                <select name="" id="">
                    <option value="">R$ Real Brasileiro</option>
                </select>
            </label>
            <label for="">
                Converter <b>para</b>
                <select class="currency-select">
                    <option value="dolar">U$$ Dólar americano</option>
                    <option value="euro">€ Euro</option>
                    <option value="libra">£ Libra</option>
                    <option value="bitcoin">₿ Bitcoin</option>
                </select>
            </label>

            <label>
                Valor
                <input placeholder="R$ 10.000,00" type="number" class="input-currency">
            </label>

            <button class="convert-button">Converter</button>

            <section>
                <div class="currency-box">
                    <img src="./assets/brasil 2.svg" alt="logo-brasil" class="br-icon">
                    <p class="currency">Real</p>
                    <p class="currency-value-to-covert">R$ 0,00</p>
                </div>

                <img src="./assets/seta.png" alt="seta" class="arrow-img">

                <div class="currency-box">
                    <img src="./assets/estados-unidos (1) 1.svg" alt="logo-usa" class="currency-img">
                    <p class="currency" id="currency-name">Dólar</p>
                    <p class="currency-value">US$ 0.0</p>
                </div>
            </section>
        </div>
    </main>
</body>

<script src="./script.js"></script>
</html>
